<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Ledger — Finance Tracker</title>
<meta name="description" content="Track income, expenses, and mileage — fast, offline, and installable on your iPhone." />

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#0F6E5C" />

<!-- iOS home-screen / standalone-app behavior -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />
<link rel="apple-touch-icon" href="./icons/icon-180.png" />
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
<link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-167.png" />
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
<link rel="icon" href="./icons/icon-32.png" sizes="32x32" />
<link rel="icon" href="./icons/icon-16.png" sizes="16x16" />

<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
<div id="app">
  <main id="main"></main>

  <nav class="tabbar">
    <button class="tab" data-tab="dashboard"><span class="ic">▤</span>Dashboard</button>
    <button class="tab" data-tab="history"><span class="ic">☰</span>History</button>
    <button class="tab add-tab" data-tab="add"><span class="ic">+</span></button>
    <button class="tab" data-tab="reports"><span class="ic">◔</span>Reports</button>
    <button class="tab" data-tab="settings"><span class="ic">⚙</span>Settings</button>
  </nav>
</div>

<!-- Bottom sheet used for add/edit forms, categories, rate & currency pickers -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="grabber"></div>
  <div class="sheet-head">
    <button data-action="close-sheet">Cancel</button>
    <h3 id="sheetTitle">&nbsp;</h3>
    <span style="width:56px;"></span>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json,.json" class="hidden" />

<script src="./js/db.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
